<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Cluster Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎭 Character Cluster Recommender</h1>
            <p class="subtitle">Find similar TV characters based on TV Tropes data</p>
        </header>

        <div class="search-section">
            <div class="search-tabs">
                <button class="tab active" data-tab="character">Search by Character</button>
                <button class="tab" data-tab="show">Search by Show</button>
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Start typing a character name...">
                <div id="suggestions" class="suggestions"></div>
            </div>
        </div>

        <div id="results" class="results-section"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
